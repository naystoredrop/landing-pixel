<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Landing com Pixel</title>

  <!-- Meta Pixel Code -->

      if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
      n.queue=[];t=b.createElement(e);t.async=!0;

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #000;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    img {
      max-width: 100%;
      display: block;
      margin: 0;
      padding: 0;
    }

    .cta {
      display: inline-block;
      background: #ff6600;
      color: #fff;
      font-size: 20px;
      font-weight: bold;
      text-align: center;
      padding: 14px 20px;
      margin: 20px auto;
      border-radius: 8px;
      text-decoration: none;
      width: 90%;
      max-width: 340px;
    }

    .cta:hover {
      background: #e05500;
    }

    .barra-aviso {
      color: #fff;
      font-size: 16px;
      text-align: center;
      background: #ff6600;
      padding: 10px;
    }
  </style>
</head>
<body>

  <!-- Barra de aviso -->
  <div class="barra-aviso">
    Somente nos dias: <b><span id="datas"></span></b> você vai pagar apenas <b>R$ 10,00</b>
  </div>

  <!-- Arte principal -->
  <img src="arte-canva.png" alt="Design do Canva">

  <!-- Blocos adicionais -->
  <img src="bloco-um.png" alt="Bloco 1">
  <img src="bloco-dois.png" alt="Bloco 2">
  <img src="bloco-tres.png" alt="Bloco 3">
  <img src="bloco-quatro.png" alt="Bloco 4">

  <!-- Botão CTA 1 -->
  <a href="https://pagamento.nayarasilveira.com.br" class="cta">
    QUERO GANHAR 5 MIL POR MÊS
  </a>

  <!-- Botão CTA 2 -->
  <a href="#tabela-preco-final" class="cta">
    QUERO COPIAR, COLAR E VENDER!
  </a>

  <script>
    function getDatas() {
      var data = new Date();
      var dias = [];
      var mesAtual = data.toLocaleString('pt-BR', { month: 'long' });

      for (var i = 2; i >= 0; i--) {
        var novaData = new Date();
        novaData.setDate(data.getDate() - i);

        var dia = novaData.getDate();
        dias.push(dia);
      }

      return dias.join(', ') + ' de ' + mesAtual;
    }

    document.getElementById("datas").textContent = getDatas();
  </script>

</body>
</html>
