<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Landing com Pixel</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #000;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .button {
      display: inline-block;
      background: #ff6600;
      color: #fff;
      padding: 15px 25px;
      margin: 20px 0;
      border-radius: 8px;
      font-weight: bold;
      font-size: 16px;
      text-decoration: none;
      text-align: center;
      transition: 0.3s;
    }
    .button:hover {
      background: #e65c00;
    }
    .block {
      text-align: center;
      margin: 20px 0;
    }
    .block img {
      max-width: 100%;
      height: auto;
    }
    .block-zero img {
      max-width: 75%;
      height: auto;
    }
  </style>
</head>
<body>

  <!-- Arte Canva -->
  <div class="block">
    <img src="arte-canva.png" alt="Arte Canva">
  </div>

  <!-- Botão principal -->
  <a href="#tabela-preco-final" class="button">QUERO GANHAR 5 MIL POR MÊS</a>

  <!-- Bloco Zero -->
  <div class="block block-zero">
    <img src="bloco-zero.png" alt="Bloco Zero">
  </div>

  <!-- Bloco Um -->
  <div class="block">
    <img src="bloco-um.png" alt="Bloco Um">
  </div>

  <!-- Bloco Dois -->
  <div class="block">
    <img src="bloco-dois.png" alt="Bloco Dois">
  </div>

  <!-- Bloco Três -->
  <div class="block">
    <img src="bloco-tres.png" alt="Bloco Três">
  </div>

  <!-- Bloco Quatro -->
  <div class="block">
    <img src="bloco-quatro.png" alt="Bloco Quatro">
  </div>

  <!-- Botão secundário -->
  <a href="#tabela-preco-final" class="button">QUERO COPIAR, COLAR E VENDER!</a>

  <!-- Bloco Cinco -->
  <div class="block">
    <img src="bloco-cinco.png" alt="Bloco Cinco">
  </div>

  <!-- Bloco Seis -->
  <div class="block">
    <img src="bloco-seis.png" alt="Bloco Seis">
  </div>

  <!-- Bloco Sete -->
  <div class="block">
    <img src="bloco-sete.png" alt="Bloco Sete">
  </div>

  <!-- Bloco Oito -->
  <div class="block">
    <img src="bloco-oito.png" alt="Bloco Oito">
  </div>

  <!-- Âncora para tabela -->
  <div id="tabela-preco-final"></div>

</body>
</html>
